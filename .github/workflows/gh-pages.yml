name: GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Use v4 (latest stable)
        with:
          submodules: recursive 
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          # Note: The latest Hugo release right now is ~0.143.1. 
          # Ensure 0.154.5 wasn't a typo, or builds will fail to download Hugo!
          hugo-version: "latest" 
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: /tmp/hugo_cache
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          # Removed the --baseURL override so it respects your hugo.toml
          hugo \
            --gc \
            --minify 

      # (Validate HTML step removed because it blocks deployment)

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3 
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          # CRITICAL: This stops GitHub from forgetting your custom domain on every push
          cname: delaportas.se